name: Build iOS & Upload to TestFlight

on:
  push:
    branches: [main, master]
    paths:
      - 'glamora-salon/**'
      - '.github/workflows/ios-build.yml'
  workflow_dispatch:

jobs:
  build-ios:
    name: Build iOS App
    runs-on: macos-latest
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Select latest Xcode
        run: |
          LATEST=$(ls /Applications/ | grep "^Xcode" | sort -V | tail -1)
          echo "Using: $LATEST"
          sudo xcode-select -s /Applications/$LATEST/Contents/Developer
          xcodebuild -version

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Node dependencies
        working-directory: glamora-salon
        run: npm install --legacy-peer-deps

      - name: Write ASC API Key
        env:
          ASC_KEY_BASE64: ${{ secrets.ASC_KEY_BASE64 }}
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
        run: |
          mkdir -p ~/.private_keys
          echo "$ASC_KEY_BASE64" | base64 --decode > ~/.private_keys/AuthKey_${ASC_KEY_ID}.p8
          echo "Key size: $(wc -c < ~/.private_keys/AuthKey_${ASC_KEY_ID}.p8) bytes"

      - name: Setup Ruby & Fastlane
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: false

      - name: Install CocoaPods and Fastlane
        run: |
          gem install i18n -v 1.14.6 --no-document
          gem install cocoapods fastlane --no-document

      - name: Sync Capacitor iOS
        working-directory: glamora-salon
        env:
          BUNDLE_GEMFILE: ""
        run: npx cap copy ios

      - name: Install Pods
        working-directory: glamora-salon/ios/App
        env:
          BUNDLE_GEMFILE: ""
        run: pod install --repo-update

      - name: Setup Signing Certificate + Push Profile via ASC API
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
        run: |
          ruby - <<'RUBYEOF'
          require 'openssl'
          require 'base64'
          require 'json'
          require 'net/http'
          require 'uri'
          require 'time'
          require 'fileutils'

          key_id     = ENV['ASC_KEY_ID']
          issuer_id  = ENV['ASC_ISSUER_ID']
          key_path   = File.expand_path("~/.private_keys/AuthKey_#{key_id}.p8")
          private_key = OpenSSL::PKey::EC.new(File.read(key_path))

          def base64url(data)
            Base64.strict_encode64(data).tr('+/', '-_').gsub('=', '')
          end

          def make_token(key_id, issuer_id, private_key)
            header  = base64url({ alg: 'ES256', kid: key_id, typ: 'JWT' }.to_json)
            now     = Time.now.to_i
            payload = base64url({ iss: issuer_id, iat: now, exp: now + 1200,
                                  aud: 'appstoreconnect-v1' }.to_json)
            signing_input = "#{header}.#{payload}"
            sig_der = private_key.sign(OpenSSL::Digest::SHA256.new, signing_input)
            asn1    = OpenSSL::ASN1.decode(sig_der)
            r = asn1.value[0].value.to_s(2).rjust(32, "\x00")[-32..]
            s = asn1.value[1].value.to_s(2).rjust(32, "\x00")[-32..]
            "#{signing_input}.#{base64url(r + s)}"
          end

          def api(token, method, path, body = nil)
            uri  = URI("https://api.appstoreconnect.apple.com#{path}")
            http = Net::HTTP.new(uri.host, uri.port)
            http.use_ssl    = true
            http.read_timeout = 30
            klass = { 'GET' => Net::HTTP::Get, 'POST' => Net::HTTP::Post,
                      'DELETE' => Net::HTTP::Delete }[method]
            req  = klass.new(uri)
            req['Authorization'] = "Bearer #{token}"
            req['Content-Type']  = 'application/json'
            req.body = body.to_json if body
            resp = http.request(req)
            JSON.parse(resp.body) rescue { 'raw' => resp.body }
          end

          token = make_token(key_id, issuer_id, private_key)

          # â”€â”€ 1. Find or create bundle ID â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
          data = api(token, 'GET', '/v1/bundleIds?filter[identifier]=com.glamora.salon')
          if data['data'].nil? || data['data'].empty?
            puts "Bundle ID not found, creating com.glamora.salon..."
            create_resp = api(token, 'POST', '/v1/bundleIds', {
              data: {
                type: 'bundleIds',
                attributes: {
                  identifier: 'com.glamora.salon',
                  name: 'Velour Salon',
                  platform: 'IOS'
                }
              }
            })
            abort "Failed to create Bundle ID: #{create_resp.inspect[0..400]}" if create_resp['data'].nil?
            bundle_rid = create_resp['data']['id']
            puts "Created Bundle ID: #{bundle_rid}"
          else
            bundle_rid = data['data'][0]['id']
            puts "Found Bundle ID: #{bundle_rid}"
          end

          # â”€â”€ 2. Ensure Push Notifications capability is enabled â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
          caps = api(token, 'GET', "/v1/bundleIds/#{bundle_rid}/bundleIdCapabilities")
          existing = (caps['data'] || []).map { |c| c.dig('attributes', 'capabilityType') }
          puts "Capabilities: #{existing.join(', ')}"
          unless existing.include?('PUSH_NOTIFICATIONS')
            r = api(token, 'POST', '/v1/bundleIdCapabilities', {
              data: { type: 'bundleIdCapabilities',
                      attributes: { capabilityType: 'PUSH_NOTIFICATIONS', settings: [] },
                      relationships: { bundleId: { data: { type: 'bundleIds', id: bundle_rid } } } }
            })
            puts "Enable push: #{r.dig('data','attributes','capabilityType') == 'PUSH_NOTIFICATIONS' ? 'âœ… enabled' : r.inspect[0..300]}"
          else
            puts "âœ… Push already enabled"
          end

          # â”€â”€ 3. Generate private key + CSR (DER format) + create dist cert â”€â”€
          system("security create-keychain -p glamora123 build.keychain 2>/dev/null || true")
          system("security default-keychain -s build.keychain")
          system("security unlock-keychain -p glamora123 build.keychain")
          system("security set-keychain-settings -t 3600 build.keychain")
          system("security list-keychains -d user -s build.keychain login.keychain")

          # Generate RSA private key
          system("openssl genrsa -out /tmp/ci_dist.key 2048 2>/dev/null")
          # Generate CSR in DER format (Apple requires DER, not PEM)
          system("openssl req -new -key /tmp/ci_dist.key -out /tmp/ci_dist.csr.der -outform DER -subj '/CN=Glamora CI Distribution/O=Glamora/C=US' 2>/dev/null")
          csr_b64 = Base64.strict_encode64(File.binread('/tmp/ci_dist.csr.der'))

          # List all certs and delete all IOS_DISTRIBUTION type (CI-created ones)
          # We keep DISTRIBUTION type (user's Apple Distribution cert)
          certs = api(token, 'GET', '/v1/certificates?limit=20')
          puts "All certs: #{(certs['data'] || []).map { |c| "#{c['id']}:#{c.dig('attributes','certificateType')}:#{c.dig('attributes','name')}" }.join(' | ')}"
          (certs['data'] || []).each do |c|
            type = c.dig('attributes', 'certificateType').to_s
            if type == 'IOS_DISTRIBUTION'
              puts "Deleting old IOS_DISTRIBUTION cert: #{c['id']} #{c.dig('attributes','name')}"
              api(token, 'DELETE', "/v1/certificates/#{c['id']}")
            end
          end

          # Create new distribution certificate via CSR
          cert_resp = api(token, 'POST', '/v1/certificates', {
            data: {
              type: 'certificates',
              attributes: {
                certificateType: 'IOS_DISTRIBUTION',
                csrContent: csr_b64
              }
            }
          })
          unless cert_resp.dig('data', 'attributes', 'certificateContent')
            abort "Certificate creation failed: #{cert_resp.inspect[0..600]}"
          end
          cert_content = cert_resp.dig('data', 'attributes', 'certificateContent')
          cert_rid = cert_resp['data']['id']
          puts "Created cert: #{cert_rid} (#{cert_resp.dig('data','attributes','name')})"

          # Build P12 from private key + Apple-signed certificate
          cert_der = Base64.decode64(cert_content)
          File.binwrite('/tmp/ci_dist.cer', cert_der)
          system("openssl x509 -inform DER -in /tmp/ci_dist.cer -out /tmp/ci_dist_cert.pem 2>/dev/null")
          system("openssl pkcs12 -export -inkey /tmp/ci_dist.key -in /tmp/ci_dist_cert.pem -out /tmp/ci_dist.p12 -passout pass:glamora123 2>/dev/null -legacy 2>/dev/null || openssl pkcs12 -export -inkey /tmp/ci_dist.key -in /tmp/ci_dist_cert.pem -out /tmp/ci_dist.p12 -passout pass:glamora123 2>/dev/null")
          result = system("security import /tmp/ci_dist.p12 -k build.keychain -P glamora123 -T /usr/bin/codesign -A 2>/dev/null")
          puts "P12 import: #{result ? 'OK' : 'FAILED'}"
          system("security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k glamora123 build.keychain 2>/dev/null || true")
          system("security find-identity -v -p codesigning build.keychain | head -5")

          # â”€â”€ 4. Delete old profiles for com.glamora.salon (App Store type) â”€
          old_profiles = api(token, 'GET',
            "/v1/profiles?filter[bundleId]=#{bundle_rid}&filter[profileType]=IOS_APP_STORE&limit=10")
          (old_profiles['data'] || []).each do |p|
            puts "Deleting old profile: #{p['id']} (#{p.dig('attributes','name')})"
            api(token, 'DELETE', "/v1/profiles/#{p['id']}")
          end

          # â”€â”€ 5. Create fresh App Store profile â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
          profile_body = {
            data: {
              type: 'profiles',
              attributes: {
                name: "Velour Salon AppStore #{Time.now.to_i}",
                profileType: 'IOS_APP_STORE'
              },
              relationships: {
                bundleId:     { data: { type: 'bundleIds',     id: bundle_rid } },
                certificates: { data: [{ type: 'certificates', id: cert_rid  }] },
                devices:      { data: [] }
              }
            }
          }
          profile_resp = api(token, 'POST', '/v1/profiles', profile_body)
          unless profile_resp.dig('data', 'attributes', 'profileContent')
            abort "Profile creation failed: #{profile_resp.inspect[0..500]}"
          end

          profile_content = profile_resp.dig('data', 'attributes', 'profileContent')
          profile_uuid    = profile_resp.dig('data', 'attributes', 'uuid')
          profile_name    = profile_resp.dig('data', 'attributes', 'name')
          puts "Created profile: #{profile_name} (UUID: #{profile_uuid})"

          # â”€â”€ 6. Install profile â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
          profile_data = Base64.decode64(profile_content)
          profiles_dir = File.expand_path("~/Library/MobileDevice/Provisioning Profiles")
          FileUtils.mkdir_p(profiles_dir)
          profile_path = "#{profiles_dir}/#{profile_uuid}.mobileprovision"
          File.write(profile_path, profile_data)
          puts "Profile installed: #{profile_path}"

          # Verify push in profile
          decoded = `security cms -D -i "#{profile_path}" 2>/dev/null`
          has_push = decoded.include?('aps-environment')
          puts has_push ? "âœ… Profile contains aps-environment (push)!" : "âŒ Profile does NOT contain push!"

          # â”€â”€ 7. Ensure App Store Connect app record exists â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
          apps = api(token, 'GET', '/v1/apps?filter[bundleId]=com.glamora.salon')
          if apps['data'].nil? || apps['data'].empty?
            puts "App record not found, creating Velour in App Store Connect..."
            app_resp = api(token, 'POST', '/v1/apps', {
              data: {
                type: 'apps',
                attributes: {
                  bundleId: 'com.glamora.salon',
                  name: 'Velour',
                  primaryLocale: 'ar-SA',
                  sku: 'velour-salon-001'
                }
              }
            })
            if app_resp['data']
              puts "Created App Store Connect record: #{app_resp['data']['id']}"
            else
              puts "App creation response: #{app_resp.inspect[0..400]}"
            end
          else
            puts "App Store Connect record found: #{apps['data'][0]['id']}"
          end

          # â”€â”€ 8. Inject profile UUID into project.pbxproj (App target only) â”€
          repo_root = File.expand_path('.')
          pbxproj_path = "#{repo_root}/glamora-salon/ios/App/App.xcodeproj/project.pbxproj"
          pbxproj = File.read(pbxproj_path)
          # Update PROVISIONING_PROFILE_SPECIFIER for App target configs
          updated = pbxproj.gsub(/PROVISIONING_PROFILE_SPECIFIER = "[^"]*";/) do
            "PROVISIONING_PROFILE_SPECIFIER = \"#{profile_name}\";"
          end
          # Update PROVISIONING_PROFILE if present
          updated = updated.gsub(/PROVISIONING_PROFILE = "[^"]*";/) do
            "PROVISIONING_PROFILE = \"#{profile_uuid}\";"
          end
          # Ensure Manual signing
          updated = updated.gsub(/CODE_SIGN_STYLE = Automatic;/, 'CODE_SIGN_STYLE = Manual;')
          updated = updated.gsub(/CODE_SIGN_IDENTITY = "[^"]*";/) do
            'CODE_SIGN_IDENTITY = "iPhone Distribution";'
          end
          File.write(pbxproj_path, updated)
          puts "Updated project.pbxproj with profile: #{profile_name} (#{profile_uuid})"

          # â”€â”€ 9. Export env vars for build step â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
          env_file = ENV['GITHUB_ENV']
          File.open(env_file, 'a') do |f|
            f.puts "PROFILE_UUID=#{profile_uuid}"
            f.puts "PROFILE_NAME=#{profile_name}"
          end
          puts "PROFILE_UUID=#{profile_uuid}"
          RUBYEOF

      - name: Build & Archive (Manual signing with fresh cert + push profile)
        working-directory: glamora-salon/ios/App
        run: |
          echo "Profile: $PROFILE_NAME (UUID: $PROFILE_UUID)"
          security unlock-keychain -p glamora123 build.keychain || true

          BUILD_NUMBER=${{ github.run_number }}
          echo "Build number: $BUILD_NUMBER"

          # project.pbxproj already updated with profile UUID/name for App target only
          # Pods have Automatic signing via Podfile post_install hook
          # Don't pass profile overrides on command line (would affect all targets)
          xcodebuild archive \
            -workspace App.xcworkspace \
            -scheme App \
            -configuration Release \
            -archivePath /tmp/App.xcarchive \
            OTHER_CODE_SIGN_FLAGS="--keychain build.keychain" \
            DEVELOPMENT_TEAM=RTYG6CS9G2 \
            CURRENT_PROJECT_VERSION=$BUILD_NUMBER

      - name: Export IPA
        run: |
          cat > /tmp/ExportOptions.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store-connect</string>
            <key>destination</key>
            <string>export</string>
            <key>teamID</key>
            <string>RTYG6CS9G2</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>com.glamora.salon</key>
              <string>${PROFILE_UUID}</string>
            </dict>
          </dict>
          </plist>
          EOF

          mkdir -p /tmp/build
          xcodebuild -exportArchive \
            -archivePath /tmp/App.xcarchive \
            -exportOptionsPlist /tmp/ExportOptions.plist \
            -exportPath /tmp/build
          echo "IPA: $(find /tmp/build -name '*.ipa')"

      - name: Upload to TestFlight via altool
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
        run: |
          IPA=$(find /tmp/build -name "*.ipa" | head -1)
          echo "Uploading: $IPA"
          xcrun altool --upload-app --type ios --file "$IPA" \
            --apiKey "${ASC_KEY_ID}" \
            --apiIssuer "${ASC_ISSUER_ID}" \
            --private-key-path ~/.private_keys/AuthKey_${ASC_KEY_ID}.p8 \
            --verbose
          echo "âœ… Upload done"

      - name: Save IPA as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Velour-Salon-IPA
          path: /tmp/build/*.ipa
          if-no-files-found: ignore
          retention-days: 30

