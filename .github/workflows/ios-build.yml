name: Build iOS & Upload to TestFlight

on:
  push:
    branches: [main, master]
    paths:
      - 'glamora-salon/**'
      - '.github/workflows/ios-build.yml'
  workflow_dispatch:

jobs:
  build-ios:
    name: Build iOS App
    runs-on: macos-latest
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Select latest Xcode
        run: |
          LATEST=$(ls /Applications/ | grep "^Xcode" | sort -V | tail -1)
          echo "Using: $LATEST"
          sudo xcode-select -s /Applications/$LATEST/Contents/Developer
          xcodebuild -version

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Node dependencies
        working-directory: glamora-salon
        run: npm install --legacy-peer-deps

      - name: Write ASC API Key
        env:
          ASC_KEY_BASE64: ${{ secrets.ASC_KEY_BASE64 }}
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
        run: |
          mkdir -p ~/.private_keys
          echo "$ASC_KEY_BASE64" | base64 --decode > ~/.private_keys/AuthKey_${ASC_KEY_ID}.p8
          echo "Key size: $(wc -c < ~/.private_keys/AuthKey_${ASC_KEY_ID}.p8) bytes"

      - name: Setup Ruby & Fastlane
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: false

      - name: Install CocoaPods and Fastlane
        run: |
          gem install i18n -v 1.14.6 --no-document
          gem install cocoapods fastlane --no-document

      - name: Sync Capacitor iOS
        working-directory: glamora-salon
        env:
          BUNDLE_GEMFILE: ""
        run: npx cap copy ios

      - name: Install Pods
        working-directory: glamora-salon/ios/App
        env:
          BUNDLE_GEMFILE: ""
        run: pod install --repo-update

      - name: Enable Push Notifications capability via App Store Connect API
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
        run: |
          gem install jwt --no-document 2>/dev/null || true

          ruby - <<'RUBYEOF'
          require 'openssl'
          require 'base64'
          require 'json'
          require 'net/http'
          require 'uri'
          require 'time'

          key_id = ENV['ASC_KEY_ID']
          issuer_id = ENV['ASC_ISSUER_ID']
          key_path = File.expand_path("~/.private_keys/AuthKey_#{key_id}.p8")

          private_key = OpenSSL::PKey::EC.new(File.read(key_path))

          def base64url(data)
            Base64.strict_encode64(data).tr('+/', '-_').gsub('=', '')
          end

          header = base64url({ alg: 'ES256', kid: ENV['ASC_KEY_ID'], typ: 'JWT' }.to_json)
          now = Time.now.to_i
          payload = base64url({ iss: ENV['ASC_ISSUER_ID'], iat: now, exp: now + 1200, aud: 'appstoreconnect-v1' }.to_json)
          signing_input = "#{header}.#{payload}"
          sig_der = private_key.sign(OpenSSL::Digest::SHA256.new, signing_input)
          # Convert DER to raw r,s for JWT
          asn1 = OpenSSL::ASN1.decode(sig_der)
          r = asn1.value[0].value.to_s(2).rjust(32, "\x00")[-32..]
          s = asn1.value[1].value.to_s(2).rjust(32, "\x00")[-32..]
          signature = base64url(r + s)
          token = "#{signing_input}.#{signature}"

          def api_call(token, method, path, body = nil)
            uri = URI("https://api.appstoreconnect.apple.com#{path}")
            http = Net::HTTP.new(uri.host, uri.port)
            http.use_ssl = true
            req_class = { 'GET' => Net::HTTP::Get, 'POST' => Net::HTTP::Post }[method]
            req = req_class.new(uri)
            req['Authorization'] = "Bearer #{token}"
            req['Content-Type'] = 'application/json'
            req.body = body.to_json if body
            JSON.parse(http.request(req).body)
          end

          # Find bundle ID
          data = api_call(token, 'GET', '/v1/bundleIds?filter[identifier]=com.glamora.salon')
          if data['data'].nil? || data['data'].empty?
            puts "Bundle ID com.glamora.salon not found in portal: #{data.inspect[0..300]}"
            exit 0
          end
          bundle_resource_id = data['data'][0]['id']
          puts "Bundle ID resource: #{bundle_resource_id}"

          # Check existing capabilities
          caps = api_call(token, 'GET', "/v1/bundleIds/#{bundle_resource_id}/bundleIdCapabilities")
          existing = (caps['data'] || []).map { |c| c.dig('attributes', 'capabilityType') }
          puts "Existing capabilities: #{existing.join(', ')}"

          if existing.include?('PUSH_NOTIFICATIONS')
            puts "✅ Push Notifications already enabled!"
            exit 0
          end

          # Enable Push Notifications
          body = {
            data: {
              type: 'bundleIdCapabilities',
              attributes: { capabilityType: 'PUSH_NOTIFICATIONS', settings: [] },
              relationships: { bundleId: { data: { type: 'bundleIds', id: bundle_resource_id } } }
            }
          }
          result = api_call(token, 'POST', '/v1/bundleIdCapabilities', body)
          if result.dig('data', 'attributes', 'capabilityType') == 'PUSH_NOTIFICATIONS'
            puts "✅ Push Notifications ENABLED successfully!"
          else
            puts "Response: #{result.inspect[0..500]}"
            puts "⚠️ Check response - may already be enabled or needs manual portal action"
          end
          RUBYEOF

      - name: Build & Archive with automatic signing + push entitlements
        working-directory: glamora-salon/ios/App
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
        run: |
          # Delete cached managed profiles to force Xcode to create fresh one with push
          rm -rf ~/Library/MobileDevice/Provisioning\ Profiles/ || true
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles/

          xcodebuild archive \
            -workspace App.xcworkspace \
            -scheme App \
            -configuration Release \
            -archivePath /tmp/App.xcarchive \
            -authenticationKeyPath ~/.private_keys/AuthKey_${ASC_KEY_ID}.p8 \
            -authenticationKeyID "${ASC_KEY_ID}" \
            -authenticationKeyIssuerID "${ASC_ISSUER_ID}" \
            -allowProvisioningUpdates \
            CODE_SIGN_STYLE=Automatic \
            DEVELOPMENT_TEAM=RTYG6CS9G2 \
            CODE_SIGN_IDENTITY="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            PROVISIONING_PROFILE="" \
            CODE_SIGN_ENTITLEMENTS="App/App.entitlements"

      - name: Export & Upload to TestFlight
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
        run: |
          mkdir -p /tmp/build
          cat > /tmp/ExportOptions.plist << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store-connect</string>
            <key>destination</key>
            <string>export</string>
            <key>teamID</key>
            <string>RTYG6CS9G2</string>
            <key>signingStyle</key>
            <string>automatic</string>
          </dict>
          </plist>
          EOF

          xcodebuild -exportArchive \
            -archivePath /tmp/App.xcarchive \
            -exportOptionsPlist /tmp/ExportOptions.plist \
            -exportPath /tmp/build \
            -authenticationKeyPath ~/.private_keys/AuthKey_${ASC_KEY_ID}.p8 \
            -authenticationKeyID "${ASC_KEY_ID}" \
            -authenticationKeyIssuerID "${ASC_ISSUER_ID}" \
            -allowProvisioningUpdates

          # Verify push entitlement
          IPA=$(find /tmp/build -name "*.ipa" | head -1)
          mkdir -p /tmp/ipa_check && cp "$IPA" /tmp/ipa_check/app.ipa
          cd /tmp/ipa_check && unzip -q app.ipa
          APP=$(find /tmp/ipa_check/Payload -name "*.app" | head -1)
          echo "=== Entitlements ==="
          codesign -d --entitlements :- "$APP" 2>/dev/null
          codesign -d --entitlements :- "$APP" 2>/dev/null | grep -i "aps-environment" && echo "✅ Push FOUND" || echo "❌ Push MISSING"

          # Upload to TestFlight
          xcrun altool --upload-app --type ios --file "$IPA" \
            --apiKey "${ASC_KEY_ID}" \
            --apiIssuer "${ASC_ISSUER_ID}" \
            --private-key-path ~/.private_keys/AuthKey_${ASC_KEY_ID}.p8

      - name: Save IPA as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Glamora-Salon-IPA
          path: /tmp/build/*.ipa
          if-no-files-found: ignore
          retention-days: 30
