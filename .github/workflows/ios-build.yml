name: Build iOS & Upload to TestFlight

on:
  push:
    branches: [main, master]
    paths:
      - 'glamora-salon/**'
      - '.github/workflows/ios-build.yml'
  workflow_dispatch:

jobs:
  build-ios:
    name: Build iOS App
    runs-on: macos-latest
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Select latest Xcode
        run: |
          LATEST=$(ls /Applications/ | grep "^Xcode" | sort -V | tail -1)
          echo "Using: $LATEST"
          sudo xcode-select -s /Applications/$LATEST/Contents/Developer
          xcodebuild -version

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Node dependencies
        working-directory: glamora-salon
        run: npm install --legacy-peer-deps

      - name: Write ASC API Key
        env:
          ASC_KEY_BASE64: ${{ secrets.ASC_KEY_BASE64 }}
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
        run: |
          mkdir -p ~/.private_keys
          echo "$ASC_KEY_BASE64" | base64 --decode > ~/.private_keys/AuthKey_${ASC_KEY_ID}.p8
          echo "Key size: $(wc -c < ~/.private_keys/AuthKey_${ASC_KEY_ID}.p8) bytes"

      - name: Setup Ruby & Fastlane
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.1'
          bundler-cache: false

      - name: Install CocoaPods and Fastlane
        run: gem install cocoapods fastlane --no-document

      - name: Sync Capacitor iOS
        working-directory: glamora-salon
        env:
          BUNDLE_GEMFILE: ""
        run: npx cap copy ios

      - name: Install Pods
        working-directory: glamora-salon/ios/App
        env:
          BUNDLE_GEMFILE: ""
        run: pod install --repo-update

      - name: Get provisioning profile with push (sigh - no MATCH_PASSWORD needed)
        env:
          APP_STORE_CONNECT_API_KEY_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          APP_STORE_CONNECT_API_KEY_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY_KEY_FILEPATH: /Users/runner/.private_keys/AuthKey_${{ secrets.ASC_KEY_ID }}.p8
          BUNDLE_GEMFILE: ""
        run: |
          mkdir -p /tmp/profiles
          fastlane sigh \
            --app_identifier com.glamora.salon \
            --team_id RTYG6CS9G2 \
            --output_path /tmp/profiles \
            --force

          PROFILE=$(ls /tmp/profiles/*.mobileprovision 2>/dev/null | head -1)
          if [ -z "$PROFILE" ]; then echo "ERROR: No profile downloaded!"; exit 1; fi

          echo "Profile: $PROFILE"
          echo "=== Push in profile? ==="
          security cms -D -i "$PROFILE" | grep -A1 "aps-environment" && echo "✅ Push IN profile" || echo "❌ Push NOT in profile"

          # Install profile
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp "$PROFILE" ~/Library/MobileDevice/Provisioning\ Profiles/

          # Get profile UUID and name for build
          PROFILE_UUID=$(security cms -D -i "$PROFILE" | grep -A1 "<key>UUID</key>" | grep string | sed 's/.*<string>\(.*\)<\/string>/\1/')
          PROFILE_NAME=$(security cms -D -i "$PROFILE" | grep -A1 "<key>Name</key>" | grep string | sed 's/.*<string>\(.*\)<\/string>/\1/')
          echo "UUID: $PROFILE_UUID"
          echo "Name: $PROFILE_NAME"
          echo "PROFILE_UUID=$PROFILE_UUID" >> $GITHUB_ENV
          echo "PROFILE_NAME=$PROFILE_NAME" >> $GITHUB_ENV

      - name: Import distribution certificate
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          APP_STORE_CONNECT_API_KEY_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY_KEY_FILEPATH: /Users/runner/.private_keys/AuthKey_${{ secrets.ASC_KEY_ID }}.p8
          BUNDLE_GEMFILE: ""
        run: |
          # Create keychain
          security create-keychain -p "glamora123" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "glamora123" build.keychain
          security set-keychain-settings -t 3600 build.keychain

          # Download distribution cert via cert action
          mkdir -p /tmp/certs
          fastlane cert \
            --output_path /tmp/certs \
            --team_id RTYG6CS9G2 \
            --keychain_path ~/Library/Keychains/build.keychain-db \
            --keychain_password glamora123 || true

          # List available signing identities
          security find-identity -v -p codesigning build.keychain | head -5 || true
          security find-identity -v -p codesigning | head -10 || true

      - name: Build & Archive
        working-directory: glamora-salon/ios/App
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
        run: |
          xcodebuild archive \
            -workspace App.xcworkspace \
            -scheme App \
            -configuration Release \
            -archivePath /tmp/App.xcarchive \
            -authenticationKeyPath ~/.private_keys/AuthKey_${ASC_KEY_ID}.p8 \
            -authenticationKeyID "${ASC_KEY_ID}" \
            -authenticationKeyIssuerID "${ASC_ISSUER_ID}" \
            -allowProvisioningUpdates \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM=RTYG6CS9G2 \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            PROVISIONING_PROFILE="${{ env.PROFILE_UUID }}" \
            CODE_SIGN_ENTITLEMENTS="App/App.entitlements"

      - name: Export & Upload to TestFlight
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
        run: |
          mkdir -p /tmp/build
          cat > /tmp/ExportOptions.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store-connect</string>
            <key>destination</key>
            <string>upload</string>
            <key>teamID</key>
            <string>RTYG6CS9G2</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>com.glamora.salon</key>
              <string>${{ env.PROFILE_UUID }}</string>
            </dict>
          </dict>
          </plist>
          EOF

          xcodebuild -exportArchive \
            -archivePath /tmp/App.xcarchive \
            -exportOptionsPlist /tmp/ExportOptions.plist \
            -exportPath /tmp/build \
            -authenticationKeyPath ~/.private_keys/AuthKey_${ASC_KEY_ID}.p8 \
            -authenticationKeyID "${ASC_KEY_ID}" \
            -authenticationKeyIssuerID "${ASC_ISSUER_ID}" \
            -allowProvisioningUpdates

      - name: Save IPA as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Glamora-Salon-IPA
          path: /tmp/build/*.ipa
          if-no-files-found: ignore
          retention-days: 30
