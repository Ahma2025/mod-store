name: Build iOS & Upload to TestFlight

on:
  push:
    branches: [main, master]
    paths:
      - 'glamora-salon/**'
      - '.github/workflows/ios-build.yml'
  workflow_dispatch:

jobs:
  build-ios:
    name: Build iOS App
    runs-on: macos-latest
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: List and select latest Xcode
        run: |
          echo "=== Available Xcodes ==="
          ls /Applications/ | grep -i xcode || true
          LATEST=$(ls /Applications/ | grep "^Xcode" | sort -V | tail -1)
          echo "Selecting: $LATEST"
          sudo xcode-select -s /Applications/$LATEST/Contents/Developer
          xcodebuild -version

      - name: Setup Ruby 3.1
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.1'
          bundler-cache: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Node dependencies
        working-directory: glamora-salon
        run: npm install

      - name: Write ASC API Key
        env:
          ASC_KEY_BASE64: ${{ secrets.ASC_KEY_BASE64 }}
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
        run: |
          mkdir -p ~/.private_keys
          echo "$ASC_KEY_BASE64" | base64 --decode > /tmp/AuthKey_${ASC_KEY_ID}.p8
          cp /tmp/AuthKey_${ASC_KEY_ID}.p8 ~/.private_keys/AuthKey_${ASC_KEY_ID}.p8
          echo "Key written: $(wc -c < /tmp/AuthKey_${ASC_KEY_ID}.p8) bytes"

      - name: Install Ruby gems via Bundler
        working-directory: glamora-salon/ios/App
        run: |
          gem install bundler --no-document
          bundle install --jobs 4 --retry 3

      - name: Sync Capacitor iOS
        working-directory: glamora-salon
        run: npx cap sync ios

      - name: Install CocoaPods dependencies
        working-directory: glamora-salon/ios/App
        run: pod install

      - name: Build app archive (Fastlane - no API key)
        # Uses match readonly=true so no Apple API key / OpenSSL needed.
        # build_only lane archives but skips IPA packaging.
        # xcodebuild will handle the export + TestFlight upload natively.
        working-directory: glamora-salon/ios/App
        env:
          MATCH_GIT_URL: ${{ secrets.MATCH_GIT_URL }}
          MATCH_GIT_TOKEN: ${{ secrets.MATCH_GIT_TOKEN }}
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          GITHUB_ACTOR: ${{ github.actor }}
        run: bundle exec fastlane build_only

      - name: Upload to TestFlight via xcodebuild
        # xcodebuild uses Apple's Security framework (not Ruby/OpenSSL) to read
        # the .p8 key, so the prime256v1 EC curve name issue does not apply.
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
        run: |
          # Write ExportOptions.plist for direct upload to TestFlight
          cat > /tmp/ExportOptions.plist << 'PLIST_EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store-connect</string>
            <key>destination</key>
            <string>upload</string>
            <key>teamID</key>
            <string>RTYG6CS9G2</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>com.glamora.salon</key>
              <string>match AppStore com.glamora.salon</string>
            </dict>
          </dict>
          </plist>
          PLIST_EOF

          echo "Uploading /tmp/App.xcarchive to TestFlight..."
          xcodebuild -exportArchive \
            -archivePath /tmp/App.xcarchive \
            -exportOptionsPlist /tmp/ExportOptions.plist \
            -exportPath /tmp/build \
            -authenticationKeyPath ~/.private_keys/AuthKey_${ASC_KEY_ID}.p8 \
            -authenticationKeyID "${ASC_KEY_ID}" \
            -authenticationKeyIssuerID "${ASC_ISSUER_ID}" \
            -allowProvisioningUpdates

      - name: Save IPA as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Glamora-Salon-IPA
          path: |
            /tmp/build/*.ipa
            glamora-salon/ios/App/App.ipa
          if-no-files-found: ignore
          retention-days: 30
