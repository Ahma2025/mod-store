name: Build iOS & Upload to TestFlight

on:
  push:
    branches: [main, master]
    paths:
      - 'glamora-salon/**'
      - '.github/workflows/ios-build.yml'
  workflow_dispatch:

jobs:
  build-ios:
    name: Build iOS App
    runs-on: macos-latest
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: List and select latest Xcode
        run: |
          echo "=== Available Xcodes ==="
          ls /Applications/ | grep -i xcode || true
          LATEST=$(ls /Applications/ | grep "^Xcode" | sort -V | tail -1)
          echo "Selecting: $LATEST"
          sudo xcode-select -s /Applications/$LATEST/Contents/Developer
          xcodebuild -version

      - name: Setup Ruby 3.1
        # Must come before cap sync so bundler uses Ruby 3.1 (not system Homebrew Ruby 3.3)
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.1'
          bundler-cache: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Node dependencies
        working-directory: glamora-salon
        run: npm install

      - name: Write and normalize ASC API Key
        # Converts .p8 from PKCS#8 to traditional EC format then back to PKCS#8
        # via macOS LibreSSL. This normalizes the EC curve OID format and fixes
        # "OpenSSL::PKey::ECError: invalid curve name" in Fastlane/spaceship on
        # arm64 macOS GitHub Actions runners.
        env:
          ASC_KEY_BASE64: ${{ secrets.ASC_KEY_BASE64 }}
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
        run: |
          echo "$ASC_KEY_BASE64" | base64 --decode > /tmp/original_key.p8
          echo "Original key size: $(wc -c < /tmp/original_key.p8) bytes"
          # Convert PKCS#8 → traditional EC → PKCS#8 to normalize OID encoding
          if /usr/bin/openssl ec -in /tmp/original_key.p8 -out /tmp/ec_key.pem 2>/dev/null && \
             /usr/bin/openssl pkcs8 -topk8 -nocrypt -in /tmp/ec_key.pem -out /tmp/normalized_key.p8 2>/dev/null; then
            echo "Key converted through EC format and re-encoded as PKCS8"
            cp /tmp/normalized_key.p8 /tmp/AuthKey_${ASC_KEY_ID}.p8
          elif /usr/bin/openssl pkey -in /tmp/original_key.p8 -out /tmp/normalized_key.p8 2>/dev/null; then
            echo "Key normalized with pkey"
            cp /tmp/normalized_key.p8 /tmp/AuthKey_${ASC_KEY_ID}.p8
          else
            echo "Normalization skipped, using original key"
            cp /tmp/original_key.p8 /tmp/AuthKey_${ASC_KEY_ID}.p8
          fi
          echo "Final key size: $(wc -c < /tmp/AuthKey_${ASC_KEY_ID}.p8) bytes"

      - name: Install Ruby gems via Bundler
        working-directory: glamora-salon/ios/App
        run: |
          gem install bundler --no-document
          bundle install --jobs 4 --retry 3

      - name: Sync Capacitor iOS
        working-directory: glamora-salon
        run: npx cap sync ios

      - name: Install CocoaPods dependencies
        working-directory: glamora-salon/ios/App
        run: pod install

      - name: Build & Upload to TestFlight
        working-directory: glamora-salon/ios/App
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_KEY_PATH: /tmp/AuthKey_${{ secrets.ASC_KEY_ID }}.p8
          MATCH_GIT_URL: ${{ secrets.MATCH_GIT_URL }}
          MATCH_GIT_TOKEN: ${{ secrets.MATCH_GIT_TOKEN }}
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          GITHUB_ACTOR: ${{ github.actor }}
        run: bundle exec fastlane beta

      - name: Save IPA as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Glamora-Salon-IPA
          path: glamora-salon/ios/App/App.ipa
          if-no-files-found: ignore
          retention-days: 30
