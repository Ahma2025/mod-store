name: Build iOS & Upload to TestFlight

on:
  push:
    branches: [main, master]
    paths:
      - 'glamora-salon/**'
      - '.github/workflows/ios-build.yml'
  workflow_dispatch:

jobs:
  build-ios:
    name: Build iOS App
    runs-on: macos-latest
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Select latest Xcode
        run: |
          LATEST=$(ls /Applications/ | grep "^Xcode" | sort -V | tail -1)
          echo "Using: $LATEST"
          sudo xcode-select -s /Applications/$LATEST/Contents/Developer
          xcodebuild -version

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Node dependencies
        working-directory: glamora-salon
        run: npm install --legacy-peer-deps

      - name: Write ASC API Key
        env:
          ASC_KEY_BASE64: ${{ secrets.ASC_KEY_BASE64 }}
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
        run: |
          mkdir -p ~/.private_keys
          echo "$ASC_KEY_BASE64" | base64 --decode > ~/.private_keys/AuthKey_${ASC_KEY_ID}.p8
          echo "Key size: $(wc -c < ~/.private_keys/AuthKey_${ASC_KEY_ID}.p8) bytes"

      - name: Setup Ruby & Fastlane
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.1'
          bundler-cache: false

      - name: Install CocoaPods and Fastlane
        run: gem install cocoapods fastlane --no-document

      - name: Sync Capacitor iOS
        working-directory: glamora-salon
        env:
          BUNDLE_GEMFILE: ""
        run: npx cap copy ios

      - name: Install Pods
        working-directory: glamora-salon/ios/App
        env:
          BUNDLE_GEMFILE: ""
        run: pod install --repo-update

      - name: Build & Upload via Fastlane beta lane
        working-directory: glamora-salon/ios/App
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_KEY_BASE64: ${{ secrets.ASC_KEY_BASE64 }}
          MATCH_GIT_URL: ${{ secrets.MATCH_GIT_URL }}
          MATCH_GIT_TOKEN: ${{ secrets.MATCH_GIT_TOKEN }}
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          GITHUB_ACTOR: ${{ github.actor }}
          BUNDLE_GEMFILE: ""
        run: fastlane beta

      - name: Verify push entitlements in IPA
        if: always()
        run: |
          IPA=$(find glamora-salon/ios/App -name "*.ipa" 2>/dev/null | head -1)
          if [ -z "$IPA" ]; then IPA=$(find /tmp -name "*.ipa" 2>/dev/null | head -1); fi
          if [ -z "$IPA" ]; then echo "No IPA found to verify"; exit 0; fi
          echo "IPA: $IPA"
          mkdir -p /tmp/ipa_check
          cp "$IPA" /tmp/ipa_check/app.ipa
          cd /tmp/ipa_check && unzip -q app.ipa
          APP=$(find /tmp/ipa_check/Payload -name "*.app" | head -1)
          echo "=== Full Entitlements ==="
          codesign -d --entitlements :- "$APP" 2>/dev/null
          echo "=== APS check ==="
          codesign -d --entitlements :- "$APP" 2>/dev/null | grep -i "aps-environment" && echo "✅ Push entitlement FOUND" || echo "❌ Push entitlement MISSING"

      - name: Verify push entitlements in IPA
        run: |
          IPA=$(find /tmp/build -name "*.ipa" | head -1)
          echo "IPA: $IPA"
          mkdir -p /tmp/ipa_check
          cp "$IPA" /tmp/ipa_check/app.ipa
          cd /tmp/ipa_check && unzip -q app.ipa
          APP=$(find /tmp/ipa_check/Payload -name "*.app" | head -1)
          echo "=== Full Entitlements ==="
          codesign -d --entitlements :- "$APP" 2>/dev/null
          echo "=== APS check ==="
          codesign -d --entitlements :- "$APP" 2>/dev/null | grep -i "aps-environment" && echo "✅ Push entitlement FOUND" || echo "❌ Push entitlement MISSING"

      - name: Save IPA as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Glamora-Salon-IPA
          path: /tmp/build/*.ipa
          if-no-files-found: ignore
          retention-days: 30
