name: Build iOS & Upload to TestFlight

on:
  push:
    branches: [main, master]
    paths:
      - 'glamora-salon/**'
      - '.github/workflows/ios-build.yml'
  workflow_dispatch:

jobs:
  build-ios:
    name: Build iOS App
    runs-on: macos-latest
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Select latest Xcode
        run: |
          LATEST=$(ls /Applications/ | grep "^Xcode" | sort -V | tail -1)
          echo "Using: $LATEST"
          sudo xcode-select -s /Applications/$LATEST/Contents/Developer
          xcodebuild -version

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Node dependencies
        working-directory: glamora-salon
        run: npm install --legacy-peer-deps

      - name: Write ASC API Key
        env:
          ASC_KEY_BASE64: ${{ secrets.ASC_KEY_BASE64 }}
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
        run: |
          mkdir -p ~/.private_keys
          echo "$ASC_KEY_BASE64" | base64 --decode > ~/.private_keys/AuthKey_${ASC_KEY_ID}.p8
          echo "Key size: $(wc -c < ~/.private_keys/AuthKey_${ASC_KEY_ID}.p8) bytes"

      - name: Setup Ruby & Fastlane
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.1'
          bundler-cache: false

      - name: Install CocoaPods and Fastlane
        run: gem install cocoapods fastlane --no-document

      - name: Sync Capacitor iOS
        working-directory: glamora-salon
        env:
          BUNDLE_GEMFILE: ""
        run: npx cap copy ios

      - name: Install Pods
        working-directory: glamora-salon/ios/App
        env:
          BUNDLE_GEMFILE: ""
        run: pod install --repo-update

      - name: Enable Push Notifications capability via App Store Connect API
        env:
          ASC_KEY_BASE64: ${{ secrets.ASC_KEY_BASE64 }}
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
        run: |
          # Generate JWT for App Store Connect API
          pip3 install PyJWT cryptography --quiet 2>/dev/null || true
          python3 - <<'PYEOF'
          import jwt, time, json, subprocess, os, sys

          key_id = os.environ['ASC_KEY_ID']
          issuer_id = os.environ['ASC_ISSUER_ID']
          key_path = os.path.expanduser(f"~/.private_keys/AuthKey_{key_id}.p8")

          with open(key_path, 'r') as f:
              private_key = f.read()

          payload = {
              'iss': issuer_id,
              'iat': int(time.time()),
              'exp': int(time.time()) + 1200,
              'aud': 'appstoreconnect-v1'
          }
          token = jwt.encode(payload, private_key, algorithm='ES256', headers={'kid': key_id})

          headers = f'Authorization: Bearer {token}'

          # Step 1: Find the bundle ID resource
          result = subprocess.run([
              'curl', '-s', '-H', headers,
              'https://api.appstoreconnect.apple.com/v1/bundleIds?filter[identifier]=com.glamora.salon'
          ], capture_output=True, text=True)
          data = json.loads(result.stdout)

          if not data.get('data'):
              print(f"Bundle ID not found: {result.stdout[:500]}")
              sys.exit(0)

          bundle_id = data['data'][0]['id']
          print(f"Found bundle ID resource: {bundle_id}")

          # Step 2: Check existing capabilities
          caps_result = subprocess.run([
              'curl', '-s', '-H', headers,
              f'https://api.appstoreconnect.apple.com/v1/bundleIds/{bundle_id}/bundleIdCapabilities'
          ], capture_output=True, text=True)
          caps_data = json.loads(caps_result.stdout)

          existing = [c['attributes']['capabilityType'] for c in caps_data.get('data', [])]
          print(f"Existing capabilities: {existing}")

          if 'PUSH_NOTIFICATIONS' in existing:
              print("✅ Push Notifications already enabled!")
              sys.exit(0)

          # Step 3: Enable Push Notifications
          enable_body = json.dumps({
              'data': {
                  'type': 'bundleIdCapabilities',
                  'attributes': {
                      'capabilityType': 'PUSH_NOTIFICATIONS',
                      'settings': []
                  },
                  'relationships': {
                      'bundleId': {
                          'data': {'type': 'bundleIds', 'id': bundle_id}
                      }
                  }
              }
          })

          enable_result = subprocess.run([
              'curl', '-s', '-X', 'POST',
              '-H', headers,
              '-H', 'Content-Type: application/json',
              '-d', enable_body,
              'https://api.appstoreconnect.apple.com/v1/bundleIdCapabilities'
          ], capture_output=True, text=True)

          print(f"Enable push result: {enable_result.stdout[:500]}")
          if '"capabilityType":"PUSH_NOTIFICATIONS"' in enable_result.stdout or '"PUSH_NOTIFICATIONS"' in enable_result.stdout:
              print("✅ Push Notifications ENABLED successfully!")
          else:
              print("⚠️  Check response above for errors")
          PYEOF

      - name: Build & Archive with automatic signing + push entitlements
        working-directory: glamora-salon/ios/App
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
        run: |
          # Delete cached managed profiles to force Xcode to create fresh one with push
          rm -rf ~/Library/MobileDevice/Provisioning\ Profiles/ || true
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles/

          xcodebuild archive \
            -workspace App.xcworkspace \
            -scheme App \
            -configuration Release \
            -archivePath /tmp/App.xcarchive \
            -authenticationKeyPath ~/.private_keys/AuthKey_${ASC_KEY_ID}.p8 \
            -authenticationKeyID "${ASC_KEY_ID}" \
            -authenticationKeyIssuerID "${ASC_ISSUER_ID}" \
            -allowProvisioningUpdates \
            CODE_SIGN_STYLE=Automatic \
            DEVELOPMENT_TEAM=RTYG6CS9G2 \
            CODE_SIGN_IDENTITY="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            PROVISIONING_PROFILE="" \
            CODE_SIGN_ENTITLEMENTS="App/App.entitlements"

      - name: Export & Upload to TestFlight
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
        run: |
          mkdir -p /tmp/build
          cat > /tmp/ExportOptions.plist << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store-connect</string>
            <key>destination</key>
            <string>export</string>
            <key>teamID</key>
            <string>RTYG6CS9G2</string>
            <key>signingStyle</key>
            <string>automatic</string>
          </dict>
          </plist>
          EOF

          xcodebuild -exportArchive \
            -archivePath /tmp/App.xcarchive \
            -exportOptionsPlist /tmp/ExportOptions.plist \
            -exportPath /tmp/build \
            -authenticationKeyPath ~/.private_keys/AuthKey_${ASC_KEY_ID}.p8 \
            -authenticationKeyID "${ASC_KEY_ID}" \
            -authenticationKeyIssuerID "${ASC_ISSUER_ID}" \
            -allowProvisioningUpdates

          # Verify push entitlement
          IPA=$(find /tmp/build -name "*.ipa" | head -1)
          mkdir -p /tmp/ipa_check && cp "$IPA" /tmp/ipa_check/app.ipa
          cd /tmp/ipa_check && unzip -q app.ipa
          APP=$(find /tmp/ipa_check/Payload -name "*.app" | head -1)
          echo "=== Entitlements ==="
          codesign -d --entitlements :- "$APP" 2>/dev/null
          codesign -d --entitlements :- "$APP" 2>/dev/null | grep -i "aps-environment" && echo "✅ Push FOUND" || echo "❌ Push MISSING"

          # Upload to TestFlight
          xcrun altool --upload-app --type ios --file "$IPA" \
            --apiKey "${ASC_KEY_ID}" \
            --apiIssuer "${ASC_ISSUER_ID}" \
            --private-key-path ~/.private_keys/AuthKey_${ASC_KEY_ID}.p8

      - name: Save IPA as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Glamora-Salon-IPA
          path: /tmp/build/*.ipa
          if-no-files-found: ignore
          retention-days: 30
