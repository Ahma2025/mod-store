name: Build iOS & Upload to TestFlight

on:
  push:
    branches: [main, master]
    paths:
      - 'glamora-salon/**'
      - '.github/workflows/ios-build.yml'
  workflow_dispatch:

jobs:
  build-ios:
    name: Build iOS App
    runs-on: macos-latest
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Select latest Xcode
        run: |
          LATEST=$(ls /Applications/ | grep "^Xcode" | sort -V | tail -1)
          echo "Using: $LATEST"
          sudo xcode-select -s /Applications/$LATEST/Contents/Developer
          xcodebuild -version

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Node dependencies
        working-directory: glamora-salon
        run: npm install --legacy-peer-deps

      - name: Write ASC API Key
        env:
          ASC_KEY_BASE64: ${{ secrets.ASC_KEY_BASE64 }}
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
        run: |
          mkdir -p ~/.private_keys
          echo "$ASC_KEY_BASE64" | base64 --decode > ~/.private_keys/AuthKey_${ASC_KEY_ID}.p8
          echo "Key size: $(wc -c < ~/.private_keys/AuthKey_${ASC_KEY_ID}.p8) bytes"

      - name: Setup Ruby & Fastlane (for CocoaPods only)
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.1'
          bundler-cache: false

      - name: Install CocoaPods
        run: gem install cocoapods --no-document

      - name: Sync Capacitor iOS (skip pod install)
        working-directory: glamora-salon
        env:
          BUNDLE_GEMFILE: ""
        run: npx cap copy ios

      - name: Install Pods
        working-directory: glamora-salon/ios/App
        env:
          BUNDLE_GEMFILE: ""
        run: pod install --repo-update

      - name: Build & Archive (xcodebuild - automatic signing)
        working-directory: glamora-salon/ios/App
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
        run: |
          xcodebuild archive \
            -workspace App.xcworkspace \
            -scheme App \
            -configuration Release \
            -archivePath /tmp/App.xcarchive \
            -authenticationKeyPath ~/.private_keys/AuthKey_${ASC_KEY_ID}.p8 \
            -authenticationKeyID "${ASC_KEY_ID}" \
            -authenticationKeyIssuerID "${ASC_ISSUER_ID}" \
            -allowProvisioningUpdates \
            CODE_SIGN_STYLE=Automatic \
            DEVELOPMENT_TEAM=RTYG6CS9G2 \
            CODE_SIGN_IDENTITY="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            PROVISIONING_PROFILE="" \
            CODE_SIGN_ENTITLEMENTS="App/App.entitlements"

      - name: Export IPA (local)
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
        run: |
          mkdir -p /tmp/build
          cat > /tmp/ExportOptions.plist << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store-connect</string>
            <key>destination</key>
            <string>export</string>
            <key>teamID</key>
            <string>RTYG6CS9G2</string>
            <key>signingStyle</key>
            <string>automatic</string>
          </dict>
          </plist>
          EOF

          xcodebuild -exportArchive \
            -archivePath /tmp/App.xcarchive \
            -exportOptionsPlist /tmp/ExportOptions.plist \
            -exportPath /tmp/build \
            -authenticationKeyPath ~/.private_keys/AuthKey_${ASC_KEY_ID}.p8 \
            -authenticationKeyID "${ASC_KEY_ID}" \
            -authenticationKeyIssuerID "${ASC_ISSUER_ID}" \
            -allowProvisioningUpdates

      - name: Verify push entitlements in IPA
        run: |
          IPA=$(find /tmp/build -name "*.ipa" | head -1)
          echo "IPA: $IPA"
          mkdir -p /tmp/ipa_check
          cp "$IPA" /tmp/ipa_check/app.ipa
          cd /tmp/ipa_check && unzip -q app.ipa
          APP=$(find /tmp/ipa_check/Payload -name "*.app" | head -1)
          echo "=== Full Entitlements ==="
          codesign -d --entitlements :- "$APP" 2>/dev/null
          echo "=== APS Environment ==="
          codesign -d --entitlements :- "$APP" 2>/dev/null | grep -i "aps-environment" && echo "✅ Push entitlement FOUND" || echo "❌ Push entitlement MISSING"

      - name: Upload to TestFlight
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
        run: |
          IPA=$(find /tmp/build -name "*.ipa" | head -1)
          echo "Uploading: $IPA"
          xcrun altool --upload-app \
            --type ios \
            --file "$IPA" \
            --apiKey "${ASC_KEY_ID}" \
            --apiIssuer "${ASC_ISSUER_ID}" \
            --private-key-path ~/.private_keys/AuthKey_${ASC_KEY_ID}.p8 \
            --show-progress || \
          xcrun altool --upload-app \
            --type ios \
            --file "$IPA" \
            --apiKey "${ASC_KEY_ID}" \
            --apiIssuer "${ASC_ISSUER_ID}" \
            --private-key-path ~/.private_keys/AuthKey_${ASC_KEY_ID}.p8

      - name: Save IPA as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Glamora-Salon-IPA
          path: /tmp/build/*.ipa
          if-no-files-found: ignore
          retention-days: 30
