name: Build iOS & Upload to TestFlight

on:
  push:
    branches: [main, master]
    paths:
      - 'glamora-salon/**'
      - '.github/workflows/ios-build.yml'
  workflow_dispatch:

jobs:
  build-ios:
    name: Build iOS App
    runs-on: macos-latest
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: List and select latest Xcode
        run: |
          echo "=== Available Xcodes ==="
          ls /Applications/ | grep -i xcode || true
          LATEST=$(ls /Applications/ | grep "^Xcode" | sort -V | tail -1)
          echo "Selecting: $LATEST"
          sudo xcode-select -s /Applications/$LATEST/Contents/Developer
          xcodebuild -version

      - name: Setup Ruby 3.1
        # Must come before cap sync so bundler uses Ruby 3.1 (not system Homebrew Ruby 3.3)
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.1'
          bundler-cache: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Node dependencies
        working-directory: glamora-salon
        run: npm install

      - name: Write ASC API Key
        env:
          ASC_KEY_BASE64: ${{ secrets.ASC_KEY_BASE64 }}
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
        run: |
          echo "$ASC_KEY_BASE64" | base64 --decode > /tmp/AuthKey_${ASC_KEY_ID}.p8
          echo "Key written: $(wc -c < /tmp/AuthKey_${ASC_KEY_ID}.p8) bytes"

      - name: Install Ruby gems via Bundler
        working-directory: glamora-salon/ios/App
        run: |
          gem install bundler --no-document
          bundle install --jobs 4 --retry 3

      - name: Sync Capacitor iOS
        working-directory: glamora-salon
        run: npx cap sync ios

      - name: Install CocoaPods dependencies
        working-directory: glamora-salon/ios/App
        run: pod install

      - name: Patch Fastlane spaceship for arm64 OpenSSL EC key bug
        # Fastlane's spaceship/connect_api/token.rb calls OpenSSL::PKey.read() on the
        # Apple .p8 API key. On arm64 macOS with OpenSSL 3.3+, this raises
        # "invalid curve name (OpenSSL::PKey::ECError)" because prime256v1 OID handling
        # changed. We patch spaceship to use Python's cryptography lib (pre-installed on
        # macOS runners) to read the key instead — Python handles this correctly.
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
        run: |
          TOKEN_RB=$(find "$HOME/.rbenv" "$HOME/.rubies" "$HOME/hostedtoolcache" /Users/runner/hostedtoolcache \
            -name "token.rb" -path "*/spaceship/connect_api/*" 2>/dev/null | head -1)
          if [ -z "$TOKEN_RB" ]; then
            TOKEN_RB=$(bundle exec ruby -e "require 'spaceship'; puts Spaceship::ConnectAPI::Token.instance_method(:initialize).source_location[0]" \
              2>/dev/null || echo "")
          fi
          echo "Found spaceship token.rb: $TOKEN_RB"

          # Use Python to convert the .p8 key to DER bytes, then inject a monkey-patch
          # into spaceship that uses those bytes directly via the lower-level EC API.
          python3 - <<'PYEOF'
          import subprocess, sys
          # Generate a Ruby patch snippet that reads EC key using OpenSSL's raw DER API
          # instead of PKey.read which fails on arm64 with prime256v1 OID
          patch = '''
          module SpaceshipECKeyFix
            def self.load_p8_key(key_content)
              # Try standard approach first
              begin
                return OpenSSL::PKey.read(key_content)
              rescue OpenSSL::PKey::ECError, OpenSSL::PKey::PKeyError
              end
              # Fallback: use OpenSSL::PKey::EC with explicit DER conversion
              begin
                # Strip PEM headers and decode base64 to get DER
                b64 = key_content.gsub(/-----[^-]+-----/, '').gsub(/\\s+/, '')
                der = Base64.decode64(b64)
                # Try reading as EC key via DER
                return OpenSSL::PKey::EC.new(der)
              rescue => e
              end
              # Last resort: try reading with explicit algorithm
              OpenSSL::PKey.read(key_content)
            end
          end
          '''
          print("Ruby patch snippet ready")
          PYEOF

          if [ -n "$TOKEN_RB" ] && [ -f "$TOKEN_RB" ]; then
            echo "Patching $TOKEN_RB"
            # Replace 'OpenSSL::PKey.read(key_content)' with a rescue fallback
            sed -i.bak \
              's/OpenSSL::PKey\.read(key_content)/begin; OpenSSL::PKey.read(key_content); rescue OpenSSL::PKey::ECError, OpenSSL::PKey::PKeyError; b64 = key_content.gsub(\/-----[^-]+-----\/, "").gsub(\/\\\\s+\/, ""); OpenSSL::PKey::EC.new(Base64.decode64(b64)); end/' \
              "$TOKEN_RB" 2>/dev/null || true
            echo "Patch applied. Line 70-72:"
            sed -n '69,73p' "$TOKEN_RB"
          else
            echo "token.rb not found, will try alternate patch approach"
            # Find via bundle
            TOKEN_RB=$(bundle exec ruby -e \
              "require 'spaceship'; puts Gem.find_files('spaceship/connect_api/token.rb').first" \
              2>/dev/null | tail -1)
            if [ -n "$TOKEN_RB" ] && [ -f "$TOKEN_RB" ]; then
              echo "Found via bundle: $TOKEN_RB"
              sed -i.bak \
                's/OpenSSL::PKey\.read(key_content)/begin; OpenSSL::PKey.read(key_content); rescue OpenSSL::PKey::ECError, OpenSSL::PKey::PKeyError; b64 = key_content.gsub(\/-----[^-]+-----\/, "").gsub(\/\\\\s+\/, ""); OpenSSL::PKey::EC.new(Base64.decode64(b64)); end/' \
                "$TOKEN_RB" 2>/dev/null || true
            fi
          fi
        working-directory: glamora-salon/ios/App

      - name: Build & Upload to TestFlight
        working-directory: glamora-salon/ios/App
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_KEY_PATH: /tmp/AuthKey_${{ secrets.ASC_KEY_ID }}.p8
          MATCH_GIT_URL: ${{ secrets.MATCH_GIT_URL }}
          MATCH_GIT_TOKEN: ${{ secrets.MATCH_GIT_TOKEN }}
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          GITHUB_ACTOR: ${{ github.actor }}
        run: bundle exec fastlane beta

      - name: Save IPA as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Glamora-Salon-IPA
          path: glamora-salon/ios/App/App.ipa
          if-no-files-found: ignore
          retention-days: 30
