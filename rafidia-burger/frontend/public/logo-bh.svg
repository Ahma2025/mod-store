<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="500" height="500">
  <defs>
    <clipPath id="bg-clip">
      <rect width="500" height="500" rx="110" ry="110"/>
    </clipPath>
    <linearGradient id="gold" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#E8B84B"/>
      <stop offset="40%"  stop-color="#C8902A"/>
      <stop offset="100%" stop-color="#8B5E10"/>
    </linearGradient>
    <linearGradient id="goldText" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#E8C060"/>
      <stop offset="50%"  stop-color="#C8921E"/>
      <stop offset="100%" stop-color="#9A6810"/>
    </linearGradient>
    <linearGradient id="bunTop" x1="0%" y1="0%" x2="20%" y2="100%">
      <stop offset="0%"   stop-color="#D4A030"/>
      <stop offset="60%"  stop-color="#B07820"/>
      <stop offset="100%" stop-color="#7A5010"/>
    </linearGradient>
    <radialGradient id="bgDark" cx="50%" cy="30%" r="70%">
      <stop offset="0%"   stop-color="#1c1c1c"/>
      <stop offset="100%" stop-color="#050505"/>
    </radialGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.6"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="500" height="500" rx="110" ry="110" fill="url(#bgDark)"/>

  <!-- ══════════════ BUN TOP ══════════════ -->
  <g clip-path="url(#bg-clip)">
    <!-- Bun dome -->
    <path d="M52,230 Q52,60 250,55 Q448,60 448,230 L448,242 Q370,210 250,210 Q130,210 52,242 Z" fill="url(#bunTop)"/>
    <!-- Bun highlight (sheen) -->
    <path d="M120,130 Q180,80 280,85 Q340,88 370,115 Q310,75 250,78 Q170,80 120,130Z" fill="#E8C050" opacity="0.25"/>
    <!-- Sesame seeds -->
    <ellipse cx="185" cy="118" rx="14" ry="7" fill="#5A3808" transform="rotate(-30,185,118)"/>
    <ellipse cx="222" cy="96"  rx="13" ry="6" fill="#5A3808" transform="rotate(-10,222,96)"/>
    <ellipse cx="262" cy="88"  rx="14" ry="6" fill="#5A3808"/>
    <ellipse cx="302" cy="96"  rx="13" ry="6" fill="#5A3808" transform="rotate(10,302,96)"/>
    <ellipse cx="336" cy="118" rx="13" ry="6" fill="#5A3808" transform="rotate(30,336,118)"/>
    <ellipse cx="204" cy="148" rx="11" ry="5" fill="#5A3808" transform="rotate(-20,204,148)"/>
    <ellipse cx="250" cy="138" rx="11" ry="5" fill="#5A3808"/>
    <ellipse cx="296" cy="148" rx="11" ry="5" fill="#5A3808" transform="rotate(20,296,148)"/>
    <!-- Bun bottom edge / shadow -->
    <path d="M52,230 Q130,260 250,260 Q370,260 448,230 L448,244 Q370,274 250,274 Q130,274 52,244 Z" fill="#6A4010" opacity="0.7"/>
  </g>

  <!-- ══════════════ BOTTOM BUN LAYERS ══════════════ -->
  <!-- Layer 1 (top bar) -->
  <rect x="62"  y="388" width="376" height="30" rx="15" fill="url(#bunTop)"/>
  <rect x="62"  y="388" width="376" height="10" rx="8"  fill="#D4A030" opacity="0.5"/>
  <!-- Layer 2 (middle bar) -->
  <rect x="74"  y="424" width="352" height="26" rx="13" fill="url(#bunTop)"/>
  <rect x="74"  y="424" width="352" height="9"  rx="6"  fill="#D4A030" opacity="0.45"/>
  <!-- Shadow under buns -->
  <rect x="85"  y="447" width="330" height="6"  rx="3"  fill="#000" opacity="0.35"/>

  <!-- ══════════════ CURSIVE "House" ══════════════ -->
  <!-- Drawn using thick italic text with stroke to mimic brush script -->
  <text
    x="252" y="368"
    font-family="'Palatino Linotype', Palatino, 'Book Antiqua', Georgia, serif"
    font-style="italic"
    font-weight="700"
    font-size="175"
    fill="url(#goldText)"
    text-anchor="middle"
    stroke="#7A5010"
    stroke-width="3"
    filter="url(#shadow)"
    letter-spacing="-6">House</text>

  <!-- Swash underline (like the logo) -->
  <path d="M138,378 Q180,395 230,385 Q260,380 290,385 Q330,392 365,378"
        stroke="url(#gold)" stroke-width="4" fill="none" stroke-linecap="round"/>

  <!-- ══════════════ "BURGER" ══════════════ -->
  <text
    x="252" y="422"
    font-family="'Arial Narrow', Arial, sans-serif"
    font-weight="900"
    font-size="38"
    fill="url(#goldText)"
    text-anchor="middle"
    letter-spacing="12"
    filter="url(#shadow)">BURGER</text>
</svg>
