<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="500" height="500">
  <defs>
    <clipPath id="hex-clip">
      <circle cx="250" cy="250" r="245"/>
    </clipPath>
    <radialGradient id="bgGrad" cx="50%" cy="40%" r="65%">
      <stop offset="0%"   stop-color="#0D2E2E"/>
      <stop offset="100%" stop-color="#050F0F"/>
    </radialGradient>
    <linearGradient id="teal" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#1DB8A8"/>
      <stop offset="100%" stop-color="#0D8070"/>
    </linearGradient>
    <linearGradient id="orange" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#FF8C00"/>
      <stop offset="100%" stop-color="#CC6000"/>
    </linearGradient>
    <filter id="glow-teal">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-orange">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Dark teal background circle -->
  <circle cx="250" cy="250" r="250" fill="#060E0E"/>
  <circle cx="250" cy="250" r="245" fill="url(#bgGrad)"/>

  <!-- Outer glow ring teal -->
  <circle cx="250" cy="250" r="238" fill="none" stroke="#1DB8A8" stroke-width="3" opacity="0.5"/>
  <circle cx="250" cy="250" r="232" fill="none" stroke="#1DB8A8" stroke-width="1" opacity="0.2"/>

  <!-- Geometric hex pattern background (subtle) -->
  <g opacity="0.07" stroke="#1DB8A8" stroke-width="1" fill="none">
    <polygon points="250,30 310,65 310,135 250,170 190,135 190,65" />
    <polygon points="250,80 290,103 290,149 250,172 210,149 210,103" />
    <polygon points="250,330 310,365 310,435 250,470 190,435 190,365" />
  </g>

  <!-- Cross / plus medical symbol (background, subtle) -->
  <rect x="232" y="60" width="36" height="100" rx="8" fill="#1DB8A8" opacity="0.08"/>
  <rect x="190" y="95" width="120" height="36" rx="8" fill="#1DB8A8" opacity="0.08"/>

  <!-- ═══ BURGER ILLUSTRATION ═══ -->
  <!-- Bun top -->
  <path d="M148,198 Q148,128 250,122 Q352,128 352,198 L352,210 Q290,192 250,192 Q210,192 148,210 Z" fill="#C8821A"/>
  <!-- Bun shine -->
  <ellipse cx="220" cy="148" rx="42" ry="18" fill="#E8A030" opacity="0.3"/>
  <!-- Seeds -->
  <ellipse cx="198" cy="152" rx="10" ry="5" fill="#8B5010" transform="rotate(-25,198,152)"/>
  <ellipse cx="232" cy="136" rx="10" ry="5" fill="#8B5010"/>
  <ellipse cx="268" cy="136" rx="10" ry="5" fill="#8B5010"/>
  <ellipse cx="302" cy="152" rx="10" ry="5" fill="#8B5010" transform="rotate(25,302,152)"/>
  <!-- Lettuce -->
  <path d="M142,208 Q200,198 250,202 Q300,198 358,208 L358,216 Q300,206 250,210 Q200,206 142,216 Z" fill="#2D8B30"/>
  <!-- Patty -->
  <rect x="148" y="216" width="204" height="20" rx="10" fill="#6B3010"/>
  <!-- Cheese -->
  <path d="M138,234 L362,234 L362,244 L358,248 L142,248 L138,244 Z" fill="#E8A820"/>
  <!-- Tomato -->
  <rect x="148" y="248" width="204" height="12" rx="6" fill="#CC2020" opacity="0.85"/>
  <!-- Bottom bun -->
  <path d="M148,260 L352,260 L352,278 Q352,292 250,292 Q148,292 148,278 Z" fill="#C8821A"/>
  <rect x="148" y="276" width="204" height="8" rx="4" fill="#A06010" opacity="0.6"/>

  <!-- Medical syringe (right side of burger) -->
  <g transform="rotate(-35, 370, 200)" opacity="0.9">
    <rect x="355" y="155" width="12" height="55" rx="3" fill="#1DB8A8"/>
    <rect x="357" y="148" width="8" height="12" rx="2" fill="#0D8070"/>
    <polygon points="361,210 365,228 357,228" fill="#1DB8A8"/>
    <rect x="350" y="172" width="22" height="4" rx="2" fill="#0A6055"/>
    <rect x="350" y="182" width="22" height="4" rx="2" fill="#0A6055"/>
  </g>

  <!-- Stethoscope (left side) -->
  <g opacity="0.85">
    <path d="M132,175 Q118,195 122,215 Q126,230 140,228" stroke="#1DB8A8" stroke-width="5" fill="none" stroke-linecap="round"/>
    <circle cx="140" cy="230" r="10" fill="none" stroke="#1DB8A8" stroke-width="4"/>
    <circle cx="140" cy="230" r="4" fill="#1DB8A8"/>
  </g>

  <!-- ═══ ICU TEXT ═══ -->
  <text
    x="250" y="362"
    font-family="'Arial Black', Impact, sans-serif"
    font-weight="900"
    font-size="130"
    fill="url(#teal)"
    text-anchor="middle"
    filter="url(#glow-teal)"
    letter-spacing="8">ICU</text>

  <!-- ═══ BURGER TEXT ═══ -->
  <text
    x="250" y="420"
    font-family="'Arial Black', Impact, sans-serif"
    font-weight="900"
    font-size="52"
    fill="url(#orange)"
    text-anchor="middle"
    filter="url(#glow-orange)"
    letter-spacing="14">BURGER</text>

  <!-- Bottom tagline -->
  <text
    x="250" y="458"
    font-family="Arial, sans-serif"
    font-size="17"
    fill="#1DB8A8"
    text-anchor="middle"
    opacity="0.7"
    letter-spacing="1">WHERE BURGERS SAVE LIVES</text>
</svg>
