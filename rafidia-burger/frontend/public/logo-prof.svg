<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 520" width="520" height="520">
  <defs>
    <path id="topText" d="M 260,260 m -165,0 a 165,165 0 1,1 330,0" />
    <filter id="textShadow">
      <feDropShadow dx="2" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.5"/>
    </filter>
    <filter id="burgerShadow">
      <feDropShadow dx="0" dy="3" stdDeviation="3" flood-color="#000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- ═══ OUTER BLACK RING ═══ -->
  <circle cx="260" cy="230" r="195" fill="#111111"/>

  <!-- ═══ RED BAND ═══ -->
  <circle cx="260" cy="230" r="190" fill="#CC1111"/>

  <!-- ═══ WHITE INNER CIRCLE ═══ -->
  <circle cx="260" cy="230" r="148" fill="white"/>

  <!-- ═══ THIN BLACK INNER RING ═══ -->
  <circle cx="260" cy="230" r="148" fill="none" stroke="#111" stroke-width="3"/>

  <!-- ═══ PROF. BURGER text on red arc ═══ -->
  <path id="arc" d="M 100,230 A 160,160 0 0,1 420,230" fill="none"/>
  <text font-family="'Arial Black', Arial, sans-serif" font-size="30" font-weight="900"
        fill="white" letter-spacing="12" filter="url(#textShadow)">
    <textPath href="#arc" startOffset="7%">PROF. BURGER</textPath>
  </text>

  <!-- ═══ φ (PHI) SYMBOL ═══ -->
  <!-- Vertical stem -->
  <line x1="260" y1="105" x2="260" y2="355" stroke="#111111" stroke-width="14" stroke-linecap="round"/>
  <!-- Circle of phi -->
  <circle cx="260" cy="225" r="68" fill="none" stroke="#111111" stroke-width="14"/>

  <!-- ═══ "Burger" YELLOW CURSIVE ═══ -->
  <!-- Black outline/stroke first -->
  <text
    x="248" y="440"
    font-family="'Palatino Linotype', Palatino, 'Book Antiqua', Georgia, serif"
    font-style="italic"
    font-weight="700"
    font-size="148"
    fill="#111111"
    text-anchor="middle"
    stroke="#111111"
    stroke-width="18"
    stroke-linejoin="round"
    letter-spacing="-4">Burger</text>
  <!-- Yellow fill -->
  <text
    x="248" y="440"
    font-family="'Palatino Linotype', Palatino, 'Book Antiqua', Georgia, serif"
    font-style="italic"
    font-weight="700"
    font-size="148"
    fill="#FFD000"
    text-anchor="middle"
    letter-spacing="-4">Burger</text>
</svg>
