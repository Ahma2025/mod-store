<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="500" height="500">
  <!-- Rounded background -->
  <rect width="500" height="500" rx="80" ry="80" fill="white"/>

  <!-- Grid lines clipped to rounded rect -->
  <clipPath id="rounded">
    <rect width="500" height="500" rx="80" ry="80"/>
  </clipPath>
  <g clip-path="url(#rounded)" stroke="#8B1A1A" stroke-width="1" opacity="0.35">
    <line x1="50"  y1="0" x2="50"  y2="500"/>
    <line x1="100" y1="0" x2="100" y2="500"/>
    <line x1="150" y1="0" x2="150" y2="500"/>
    <line x1="200" y1="0" x2="200" y2="500"/>
    <line x1="250" y1="0" x2="250" y2="500"/>
    <line x1="300" y1="0" x2="300" y2="500"/>
    <line x1="350" y1="0" x2="350" y2="500"/>
    <line x1="400" y1="0" x2="400" y2="500"/>
    <line x1="450" y1="0" x2="450" y2="500"/>
    <line x1="0" y1="50"  x2="500" y2="50"/>
    <line x1="0" y1="100" x2="500" y2="100"/>
    <line x1="0" y1="150" x2="500" y2="150"/>
    <line x1="0" y1="200" x2="500" y2="200"/>
    <line x1="0" y1="250" x2="500" y2="250"/>
    <line x1="0" y1="300" x2="500" y2="300"/>
    <line x1="0" y1="350" x2="500" y2="350"/>
    <line x1="0" y1="400" x2="500" y2="400"/>
    <line x1="0" y1="450" x2="500" y2="450"/>
  </g>

  <!-- THE — centered top -->
  <text
    x="250" y="155"
    font-family="Arial Black, sans-serif"
    font-weight="900"
    font-size="58"
    fill="#1a1a1a"
    text-anchor="middle"
    letter-spacing="8">THE</text>

  <!-- 57 — perfectly centered -->
  <text
    x="250" y="400"
    font-family="Arial Black, sans-serif"
    font-weight="900"
    font-size="300"
    fill="#8B1A1A"
    text-anchor="middle"
    letter-spacing="-8">57</text>
</svg>
